<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | BuyingAgentIndia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .auth-card { max-width: 600px; margin: 50px auto; padding: 40px; border-radius: 20px; background: #fff; border: none; }
        
        /* Navbar Brand Style */
        .brand { font-size: 24px; font-weight: bold; color: #000; text-decoration: none; display: block; text-align: center; margin-bottom: 20px; }
        .brand span { color: #2f6fed; }

        /* Tabs Styling */
        .nav-pills .nav-link { color: #666; font-weight: 600; border-radius: 50px; padding: 10px 20px; }
        
        /* Buyer Tab - Orange */
        #buyer-tab.active { background-color: #ff7612 !important; color: white !important; box-shadow: 0 4px 12px rgba(255, 118, 18, 0.3); }
        
        /* Seller Tab - Blue */
        #seller-tab.active { background-color: #1a73e8 !important; color: white !important; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); }

        /* Form Styling */
        .form-label { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .form-control, .form-select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        
        /* Buttons */
        .btn-orange { background-color: #ff7612; color: white; border: none; font-weight: 700; padding: 12px; }
        .btn-orange:hover { background-color: #e66a10; color: white; }
        
        .btn-blue { background-color: #1a73e8; color: white; border: none; font-weight: 700; padding: 12px; }
        .btn-blue:hover { background-color: #155cb0; color: white; }

        .divider { height: 1px; background: #eee; margin: 30px 0; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-card shadow-lg">
        <a class="brand" href="#">BUYINGAGENT<span>INDIA</span></a>

        <ul class="nav nav-pills nav-justified mb-4 bg-light p-1 rounded-pill" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="buyer-tab" data-bs-toggle="pill" data-bs-target="#pills-buyer" type="button">Register as Buyer</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="seller-tab" data-bs-toggle="pill" data-bs-target="#pills-seller" type="button">Register as Seller</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="pills-buyer">
                <h4 class="fw-bold mb-1">Join as a <span style="color: #ff7612;">Buyer</span></h4>
                <p class="text-muted small mb-4">Find the best Indian suppliers for your business.</p>
                
                <form class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="e.g. John Doe">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Work Email</label>
                        <input type="email" class="form-control" placeholder="name@company.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Sourcing Category</label>
                        <select class="form-select">
                            <option selected>Select Category...</option>
                            <option>Textiles & Apparel</option>
                            <option>Jewelry & Accessories</option>
                            <option>Handicrafts</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Create a password">
                    </div>
                    <div class="col-12 mt-4">
                        <button class="btn btn-orange w-100">Create Buyer Account</button>
                    </div>
                </form>
            </div>

            <div class="tab-pane fade" id="pills-seller">
                <h4 class="fw-bold mb-1">Join as a <span style="color: #1a73e8;">Seller</span></h4>
                <p class="text-muted small mb-4">Showcase your products to global buyers.</p>
                
                <form class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Company Name</label>
                        <input type="text" class="form-control" placeholder="Business Ltd.">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Person</label>
                        <input type="text" class="form-control" placeholder="Your Name">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Business Type</label>
                        <select class="form-select">
                            <option>Manufacturer</option>
                            <option>Wholesaler</option>
                            <option>Exporter</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Mobile Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">+91</span>
                            <input type="text" class="form-control" placeholder="9876543210">
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Create Password</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="checkTerms">
                            <label class="form-check-label small" for="checkTerms">I agree to the Agreement & Policy</label>
                        </div>
                    </div>
                    <div class="col-12 mt-4">
                        <button class="btn btn-blue w-100">Register Business</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="divider"></div>
        <p class="text-center small mb-0">Already have an account? <a href="/views/login-register.html" class="fw-bold text-decoration-none">Log In</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
