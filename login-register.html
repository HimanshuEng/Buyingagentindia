<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration | BuyingAgentIndia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
    /* Auth Page Specific Styles */
.auth-card {
    width: 100%;
    max-width: 450px;
    padding: 40px;
    border-radius: 20px;
}

/* Custom Tab Styling */
.nav-pills .nav-link {
    color: #666;
    font-weight: 600;
    transition: 0.3s;
}

/* Buyer Active State (Orange) */
#buyer-tab.active {
    background-color: #ff7612 !important;
    color: white !important;
}

/* Seller Active State (Blue) */
#seller-tab.active {
    background-color: #1a73e8 !important;
    color: white !important;
}

/* Form Inputs */
.form-control {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.form-control:focus {
    box-shadow: none;
    border-color: #2f6fed;
}

/* Divider Line */
.divider {
    position: relative;
    text-align: center;
}
.divider::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #eee;
    z-index: 1;
}
.divider span {
    position: relative;
    z-index: 2;
    background: white;
    padding: 0 15px;
    font-size: 12px;
    color: #aaa;
}

/* Reuse existing button colors from navbar */
.btn-orange { background-color: #ff7612; color: white; }
.btn-blue { background-color: #1a73e8; color: white; }
   </style>
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="auth-card bg-white shadow-lg">
            
            <div class="text-center mb-4">
                <a class="navbar-brand fw-bold fs-3" href="index.html">BUYINGAGENT<span>INDIA</span></a>
                <p class="text-muted mt-2">Grow your business globally</p>
            </div>

            <ul class="nav nav-pills nav-justified mb-4 p-1 bg-light rounded-pill" id="roleTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active rounded-pill" id="buyer-tab" data-bs-toggle="pill" data-bs-target="#buyer-form">Buyer</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link rounded-pill" id="seller-tab" data-bs-toggle="pill" data-bs-target="#seller-form">Seller</button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="buyer-form">
                    <h4 class="fw-bold mb-3">Buyer Login</h4>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control" placeholder="name@company.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-orange w-100 py-2">Continue as Buyer</button>
                    </form>
                    <div class="text-center mt-4">
                        <span class="small text-muted">Don't have a buyer account?</span>
                        <a href="register.html" class="small fw-bold text-decoration-none" style="color: #ff7612;">Register Now</a>
                    </div>
                </div>

                <div class="tab-pane fade" id="seller-form">
                    <h4 class="fw-bold mb-3">Seller Login</h4>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Business Email</label>
                            <input type="email" class="form-control" placeholder="sales@yourbrand.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-blue w-100 py-2">Seller Dashboard Login</button>
                    </form>
                    <div class="text-center mt-4">
                        <span class="small text-muted">Want to sell on our platform?</span>
                        <a href="register.html" class="small fw-bold text-decoration-none" style="color: #1a73e8;">Create Seller Account</a>
                    </div>
                </div>
            </div>

            <div class="divider my-4"><span>OR</span></div>
            
            <div class="d-grid gap-2">
                <button class="btn btn-outline-dark btn-sm rounded-2 py-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16" class="me-2"> 
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
